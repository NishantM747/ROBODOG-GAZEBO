# parameter_bridge.yaml - MINIMAL VERSION
# Only bridge essential topics

# Clock synchronization
- ros_topic_name: "/clock"
  gz_topic_name: "/clock"
  ros_type_name: "rosgraph_msgs/msg/Clock"
  gz_type_name: "ignition.msgs.Clock"
  direction: GZ_TO_ROS

# Velocity commands (ROS to Gazebo)
- ros_topic_name: "/cmd_vel"
  gz_topic_name: "/cmd_vel"
  ros_type_name: "geometry_msgs/msg/Twist"
  gz_type_name: "ignition.msgs.Twist"
  direction: ROS_TO_GZ

- ros_topic_name: /imu
  gz_topic_name: /imu
  ros_type_name: sensor_msgs/msg/Imu
  gz_type_name: gz.msgs.IMU
  direction: GZ_TO_ROS

- ros_topic_name: /odom
  gz_topic_name: /odom
  ros_type_name: nav_msgs/msg/Odometry
  gz_type_name: gz.msgs.Odometry
  direction: GZ_TO_ROS


# TF transforms
#- ros_topic_name: "/tf"
 # gz_topic_name: "/model/rover/tf"
  #ros_type_name: "tf2_msgs/msg/TFMessage"
  #gz_type_name: "ignition.msgs.Pose_V"
  #direction: GZ_TO_ROS

- ros_topic_name: "/rgbd/points"
  gz_topic_name: "/rgbd/points"
  ros_type_name: "sensor_msgs/msg/PointCloud2"
  gz_type_name: "ignition.msgs.PointCloudPacked"
  direction: GZ_TO_ROS

-  ros_topic_name: "/model/rover/pose"
   gz_topic_name: "/model/rover/pose"
   ros_type_name: "geometry_msgs/msg/Pose"
   ign_type_name: "ignition.msgs.Pose"
   direction: "GZ_TO_ROS"

- ros_topic_name: "/model/rover/tf"
  gz_topic_name: "/model/rover/tf"
  ros_type_name: "tf2_msgs/msg/TFMessage"
  ign_type_name: "ignition.msgs.Pose_V"
  direction: "GZ_TO_ROS"
